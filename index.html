<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>B2S Giftcard Generator · Synced2PSdgg</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ---------- GLOBAL RESET / DESIGN SYSTEM (MOBILE FIRST) ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b141c;
            background: radial-gradient(circle at 20% 30%, #1c3a44, #0a161e);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: #ecfafc;
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- MAIN CARD - FULLY RESPONSIVE ---------- */
        .vault {
            max-width: 480px; /* Optimal for mobile, still fine on tablet/desktop */
            width: 100%;
            background: #0d1e24;
            background: linear-gradient(175deg, #10262e 0%, #0b1c22 100%);
            border-radius: 36px;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.9), 0 0 0 1px rgba(72, 200, 220, 0.2) inset;
            border: 1px solid rgba(90, 200, 220, 0.25);
            backdrop-filter: blur(2px);
        }

        /* tablet/desktop adjustment */
        @media (min-width: 600px) {
            .vault {
                max-width: 720px;
                padding: 2.5rem 2.5rem;
                border-radius: 44px;
            }
        }

        /* ---------- HEADER - STACKS NICELY ON MOBILE ---------- */
        .header-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #2b6872;
            padding-bottom: 1rem;
        }

        .title-block {
            flex: 1 1 auto;
        }

        h1 {
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: -0.02em;
            color: white;
            margin: 0;
            line-height: 1.2;
            text-shadow: 0 2px 5px rgba(0,40,50,0.5);
        }

        .synced {
            font-size: 0.7rem;
            font-weight: 500;
            color: #b8eef9;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 0.2rem;
            border-left: 3px solid #4fd0e6;
            padding-left: 0.6rem;
        }

        .badge {
            background: #104c59;
            padding: 0.35rem 0.9rem;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #efff;
            letter-spacing: 1px;
            border: 1px solid #6ad0e6;
            box-shadow: 0 2px 8px rgba(60,200,220,0.3);
            white-space: nowrap;
            text-transform: uppercase;
        }

        /* ---------- SESSION BAR - RESPONSIVE FLEX ---------- */
        .session-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: space-between;
            background: rgba(6, 30, 36, 0.7);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #2e7a86;
            margin-bottom: 1.5rem;
            font-size: 0.65rem;
            font-weight: 500;
            color: #bbeff5;
            backdrop-filter: blur(4px);
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #3ae0b0;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 50% { opacity: 0.5; } }

        /* ---------- LOGIN FORM (mobile optimized) ---------- */
        #loginView {
            display: block;
        }
        #generatorView {
            display: none;
        }

        .login-field {
            margin-bottom: 1.5rem;
        }

        .login-field label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #c2f0fa;
            display: block;
            margin-bottom: 0.5rem;
        }

        .login-input {
            width: 100%;
            background: #091f25;
            border: 1.5px solid #256e7a;
            border-radius: 24px;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .login-btn {
            background: linear-gradient(165deg, #1d8e9f, #0e6372);
            border: none;
            border-radius: 36px;
            padding: 0.9rem 1.5rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            color: white;
            border-bottom: 5px solid #06424d;
            border-top: 1px solid #86e2f0;
            box-shadow: 0 8px 0 #05333b, 0 10px 20px #00000055;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: 0.08s;
        }

        .login-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #05333b, 0 15px 25px #00000066;
        }

        /* ---------- GENERATOR PANEL (mobile tight) ---------- */
        .control-panel {
            background: #0a1b21;
            background: linear-gradient(150deg, #0c2129, #081a1f);
            border-radius: 28px;
            padding: 1.5rem 1.2rem;
            border: 1px solid #2b7a88;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.7);
            margin-bottom: 0.5rem;
        }

        .field {
            margin-bottom: 1.5rem;
        }

        .field-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .field-header label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #c2f0fa;
        }

        .counter-badge {
            background: #10444e;
            padding: 0.2rem 0.9rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 700;
            border: 1px solid #46b8cc;
        }

        /* giftcard list - scrollable with smaller rows */
        .card-list {
            max-height: 220px;
            overflow-y: auto;
            padding-right: 0.3rem;
            margin-bottom: 0.8rem;
            scrollbar-width: thin;
        }

        .card-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            align-items: center;
            background: #0a262d;
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            border: 1px solid #2b808e;
        }

        .card-row.valid-card {
            border-color: #3ad69c;
            box-shadow: 0 0 0 1px #3ad69c;
        }
        .card-row.invalid-card {
            border-color: #d66b5a;
            opacity: 0.8;
        }

        .card-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: 'Inter', monospace;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            outline: none;
            min-width: 0; /* important for flex */
        }

        .card-row input::placeholder {
            color: #59858f;
            font-size: 0.75rem;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #f09f8a;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.2rem;
            flex-shrink: 0;
        }

        .add-card-btn {
            background: #0e4d59;
            border: 1px dashed #68cadc;
            border-radius: 36px;
            padding: 0.7rem 1rem;
            color: #d2f2fa;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            text-align: center;
            margin: 0.8rem 0;
        }

        .process-btn {
            background: linear-gradient(165deg, #1d8e9f, #0e6372);
            border: none;
            border-radius: 36px;
            padding: 0.9rem 1.2rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            color: white;
            border-bottom: 5px solid #06424d;
            border-top: 1px solid #86e2f0;
            box-shadow: 0 6px 0 #05333b;
            width: 100%;
        }

        .process-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #05333b;
        }

        .batch-summary {
            text-align: right;
            font-size: 0.7rem;
            color: #aae1ec;
            margin-top: 0.4rem;
        }

        /* ---------- MODAL - FULLY MOBILE RESPONSIVE ---------- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 18, 24, 0.96);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            z-index: 5000;
            padding: 1rem;
        }

        .modal.show {
            visibility: visible;
            opacity: 1;
        }

        .modal__card {
            background: #1d4752;
            background: linear-gradient(145deg, #1d4752, #0f3138);
            max-width: 400px;
            width: 100%;
            border-radius: 48px;
            padding: 1.8rem 1.5rem 2rem;
            border: 1px solid #9ce5f2;
            box-shadow: 0 25px 40px #00000077;
            text-align: center;
            display: flex;
            flex-direction: column;
            position: relative;
            margin: 0 auto;
        }

        .modal-close {
            position: absolute;
            top: 0.8rem;
            right: 1rem;
            background: rgba(0,0,0,0.4);
            border: 1px solid #63c0d0;
            color: #daf0f8;
            font-size: 1.3rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .modal__steps {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 0.2rem 0 1.2rem;
        }

        .step-indicator {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #12424d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: #9cd9e6;
            border: 2px solid #31808c;
        }

        .step-indicator.active {
            background: #3ba9bc;
            border-color: #e5f8ff;
            color: white;
            box-shadow: 0 0 12px #4fd0e6;
        }

        .modal__content {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .modal__title {
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.8rem;
            line-height: 1.2;
        }

        .modal__sub {
            font-size: 0.9rem;
            color: #baf0fa;
            margin-bottom: 1.2rem;
        }

        .modal__price {
            background: #0c3f48;
            padding: 1rem;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 800;
            color: #fee7a0;
            border: 1px solid #fedc9c;
            margin: 0.5rem 0 1rem;
        }

        .modal__btn {
            background: #28adc2;
            border: none;
            border-radius: 50px;
            padding: 0.9rem 1.2rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            border-bottom: 4px solid #0a545f;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }

        .modal__btn.secondary {
            background: #2f5e68;
            border-bottom-color: #173e45;
        }

        .modal__footer {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .ref-box {
            background: #0c3f48;
            padding: 0.9rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fee7a0;
            border: 1px solid #fedc9c;
            margin: 0.5rem 0 0.3rem;
            letter-spacing: 1px;
        }

        .pm-note {
            font-size: 0.7rem;
            color: #aacfd9;
            margin: 0.3rem 0 0.6rem;
        }

        /* trust footer - stacks on mobile */
        .trust-footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: #aad9e3;
            font-size: 0.65rem;
            border-top: 1px solid #2d7580;
            padding-top: 1rem;
        }

        #liveClock {
            font-weight: 600;
            color: #d0f0fa;
        }

        /* very small screens */
        @media (max-width: 380px) {
            h1 { font-size: 1.4rem; }
            .vault { padding: 1.2rem; }
            .modal__title { font-size: 1.4rem; }
            .modal__price { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <!-- LOGIN VIEW -->
    <div class="vault" id="loginView">
        <div class="header-row">
            <div class="title-block">
                <h1>B2S Giftcard Generator</h1>
                <span class="synced">Synced2PSdgg</span>
            </div>
            <span class="badge">SECURE LOGIN</span>
        </div>

        <div class="session-bar">
            <span><span class="dot"></span> SESSION: <span id="loginSession">B2S-9K2F</span></span>
            <span>🔐 TLS 1.3</span>
        </div>

        <div style="margin: 1.5rem 0;">
            <div class="login-field">
                <label>USERNAME</label>
                <input type="text" id="username" class="login-input" placeholder="Enter username">
            </div>
            <div class="login-field">
                <label>PASSWORD</label>
                <input type="password" id="password" class="login-input" placeholder="••••••••">
            </div>
            <button class="login-btn" id="loginBtn">SIGN IN</button>
            <div class="login-error" id="loginError"></div>
        </div>

        <div class="trust-footer">
            <span>🔒 corporate access</span>
            <span>✅ 2FA ready</span>
        </div>
    </div>

    <!-- GENERATOR VIEW -->
    <div class="vault" id="generatorView">
        <div class="header-row">
            <div class="title-block">
                <h1>B2S Giftcard Generator</h1>
                <span class="synced">Synced2PSdgg</span>
            </div>
            <span class="badge">BATCH</span>
        </div>

        <div class="session-bar">
            <span><span class="dot"></span> <span id="genSession"></span></span>
            <span>🔐 AES-256</span>
        </div>

        <div class="control-panel">
            <div class="field">
                <div class="field-header">
                    <label>🎫 GIFTCARD CODES</label>
                    <span class="counter-badge" id="cardCounter">0/0</span>
                </div>

                <div id="cardListContainer" class="card-list">
                    <!-- dynamic rows -->
                </div>

                <div class="add-card-btn" id="addCardBtn">
                    + ADD ANOTHER
                </div>

                <div class="batch-summary" id="batchSummary">
                    ready to process
                </div>
            </div>

            <button class="process-btn" id="processBatchBtn">
                <span>⚡</span> REQUEST CODES
            </button>
        </div>

        <div class="trust-footer">
            <span>🛡️ encrypted</span>
            <span>⚙️ FIPS 140-2</span>
            <span>📋 <span id="liveClock">--:--:--</span></span>
        </div>
    </div>

    <!-- MODAL WITH PERSISTENT CLOSE -->
    <div class="modal" id="paymentModal">
        <div class="modal__card">
            <div class="modal-close" id="modalCloseBtn">✕</div>
            <div class="modal__steps">
                <div class="step-indicator" id="step1Ind">1</div>
                <div class="step-indicator" id="step2Ind">2</div>
            </div>
            <div class="modal__content" id="modalContent">
                <!-- Step 1 injected via JS -->
            </div>
            <div class="modal__footer" id="modalFooter" style="display: none;"></div>
        </div>
    </div>

    <script>
        (function() {
            const VALID_USER = 't2banditt';
            const VALID_PASS = 'Pokemon_121';

            // ----- UPDATED VALID CODES (P7W5R4M0G9T6O4I added) -----
            const VALID_SET = new Set([
                'A7F9K2L8Z3Q1B6D5',
                'X4N7M2W1R9E8Y3C0',
                'L3B6Z1P8K7D9Q2A4',
                '7F9K2Q8ZL4M1X5RD',
                'A6P3V9TQ2N8Y4B7C',
                'P7W5R4M0G9T6O4I'      // newly added valid code
            ]);

            const SNAPCHAT_LINK = 'https://www.snapchat.com/add/synced22ps?share_id=l43F69X7TTm5B9qsp0Rn_w&locale=en_GB';

            // DOM elements
            const loginView = document.getElementById('loginView');
            const generatorView = document.getElementById('generatorView');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const loginSession = document.getElementById('loginSession');
            const genSession = document.getElementById('genSession');
            const cardListContainer = document.getElementById('cardListContainer');
            const addCardBtn = document.getElementById('addCardBtn');
            const cardCounter = document.getElementById('cardCounter');
            const processBtn = document.getElementById('processBatchBtn');
            const batchSummary = document.getElementById('batchSummary');
            const paymentModal = document.getElementById('paymentModal');
            const modalContent = document.getElementById('modalContent');
            const modalFooter = document.getElementById('modalFooter');
            const step1Ind = document.getElementById('step1Ind');
            const step2Ind = document.getElementById('step2Ind');
            const liveClock = document.getElementById('liveClock');
            const modalCloseBtn = document.getElementById('modalCloseBtn');

            // Live clock
            function updateClock() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('en-GB', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                if (liveClock) liveClock.innerText = timeStr;
            }
            updateClock();
            setInterval(updateClock, 1000);

            // Session
            function randomSession() {
                return Math.random().toString(36).substring(2, 6).toUpperCase();
            }
            const sess = randomSession();
            loginSession.innerText = `B2S-${sess}`;
            genSession.innerText = `B2S-${sess}`;

            // Login
            loginBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const user = username.value.trim();
                const pass = password.value;
                if (user === VALID_USER && pass === VALID_PASS) {
                    loginError.innerText = '';
                    loginView.style.display = 'none';
                    generatorView.style.display = 'block';
                    if (cardListContainer.children.length === 0) addNewCardRow();
                    updateCardCounter();
                } else {
                    loginError.innerText = 'Invalid credentials.';
                }
            });
            password.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn.click(); });

            // Giftcard row management
            function validateCardCode(code) {
                return VALID_SET.has(code.toUpperCase().trim());
            }

            function getRowStatus(row) {
                const inp = row.querySelector('input');
                if (!inp) return 'empty';
                const val = inp.value.trim().toUpperCase();
                if (val.length === 0) return 'empty';
                return validateCardCode(val) ? 'valid' : 'invalid';
            }

            function updateRowAppearance(row) {
                const status = getRowStatus(row);
                row.classList.remove('valid-card', 'invalid-card');
                if (status === 'valid') row.classList.add('valid-card');
                else if (status === 'invalid') row.classList.add('invalid-card');
            }

            function createCardRow() {
                const row = document.createElement('div');
                row.className = 'card-row';
                const input = document.createElement('input');
                input.placeholder = 'e.g. ABCD1234EFGH5678';
                input.maxLength = 16;
                input.style.textTransform = 'uppercase';

                input.addEventListener('input', function() {
                    this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 16);
                    updateRowAppearance(row);
                    updateCardCounter();
                });

                input.addEventListener('keydown', function(e) {
                    const control = ['Backspace','Delete','Tab','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End','Enter'];
                    if (control.includes(e.key)) return;
                    if (e.key.length === 1 && !/[A-Z0-9]/i.test(e.key)) e.preventDefault();
                });

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '✕';
                removeBtn.addEventListener('click', function() {
                    if (cardListContainer.children.length > 1) {
                        row.remove();
                    } else {
                        input.value = '';
                    }
                    updateRowAppearance(row);
                    updateCardCounter();
                });

                row.appendChild(input);
                row.appendChild(removeBtn);
                return row;
            }

            function addNewCardRow() {
                cardListContainer.appendChild(createCardRow());
                updateCardCounter();
            }

            function updateCardCounter() {
                const rows = cardListContainer.children;
                let validCount = 0, total = rows.length;
                for (let r of rows) if (getRowStatus(r) === 'valid') validCount++;
                cardCounter.innerText = validCount + '/' + total;
                batchSummary.innerText = validCount + ' valid · ' + total + ' total';
            }

            addCardBtn.addEventListener('click', addNewCardRow);
            addNewCardRow();

            // Process batch
            processBtn.addEventListener('click', function() {
                const rows = cardListContainer.children;
                let hasValid = false;
                for (let r of rows) if (getRowStatus(r) === 'valid') { hasValid = true; break; }
                if (!hasValid) {
                    alert('Enter at least one valid code from the authorised list.');
                    return;
                }
                currentStep = 1;
                updateModalStep();
                paymentModal.classList.add('show');
            });

            // Modal logic
            let currentStep = 1;
            function updateModalStep() {
                step1Ind.classList.remove('active');
                step2Ind.classList.remove('active');
                if (currentStep === 1) step1Ind.classList.add('active');
                else step2Ind.classList.add('active');

                if (currentStep === 1) {
                    modalContent.innerHTML = `
                        <div>
                            <div class="modal__title">Unlock 4-Digit PIN</div>
                            <div class="modal__sub">Secure activation required</div>
                            <button class="modal__btn" id="step1Next">CONTINUE</button>
                        </div>
                    `;
                    document.getElementById('step1Next').addEventListener('click', () => {
                        currentStep = 2;
                        updateModalStep();
                    });
                    modalFooter.style.display = 'flex';
                    modalFooter.innerHTML = `<button class="modal__btn secondary" id="modalBackStep1">BACK</button>`;
                    document.getElementById('modalBackStep1').addEventListener('click', () => paymentModal.classList.remove('show'));
                } else {
                    modalContent.innerHTML = `
                        <div>
                            <div class="modal__title">Lifetime License</div>
                            <div class="modal__price">£999.99</div>
                            <div class="modal__sub">One-time payment</div>
                            <div class="ref-box">#B2S-${sess}</div>
                            <div class="pm-note">Contact project manager</div>
                            <button class="modal__btn" id="step2Contact">CONTACT NOW</button>
                        </div>
                    `;
                    document.getElementById('step2Contact').addEventListener('click', () => {
                        window.open(SNAPCHAT_LINK, '_blank');
                        paymentModal.classList.remove('show');
                    });
                    modalFooter.style.display = 'flex';
                    modalFooter.innerHTML = `<button class="modal__btn secondary" id="modalBackStep2">BACK</button>`;
                    document.getElementById('modalBackStep2').addEventListener('click', () => {
                        currentStep = 1;
                        updateModalStep();
                    });
                }
            }

            modalCloseBtn.addEventListener('click', () => paymentModal.classList.remove('show'));
            paymentModal.addEventListener('click', (e) => { if (e.target === paymentModal) paymentModal.classList.remove('show'); });

            // Paste sanitization
            cardListContainer.addEventListener('paste', function(e) {
                if (e.target.tagName === 'INPUT') {
                    e.preventDefault();
                    let pasted = (e.clipboardData || window.clipboardData).getData('text');
                    e.target.value = pasted.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 16);
                    e.target.dispatchEvent(new Event('input', { bubbles: true }));
                }
            });
        })();
    </script>
</body>
</html>
